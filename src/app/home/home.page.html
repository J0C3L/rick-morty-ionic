<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Rick & Morty Collage</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col size="6" size-md="4" size-lg="3" *ngFor="let c of characters">
        <ion-card>
          <img [src]="c.image" [alt]="c.name" />
          <ion-card-header>
            <ion-card-subtitle>{{ c.species }}</ion-card-subtitle>
            <ion-card-title>{{ c.name }}</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            Estado: <strong>{{ c.status }}</strong>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
